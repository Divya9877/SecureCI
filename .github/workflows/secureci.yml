name: SecureCI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      SECURECI_TOKEN: ${{ secrets.SECURECI_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install flask reportlab requests prometheus_client

      - name: Run SecureCI Checks
        run: |
          python pipeline_check.py
